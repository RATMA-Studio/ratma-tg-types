[workspace]
members = ["crates/codegen", "crates/core", "crates/http"]
resolver = "3"

[package]
name = "ratma-tg-types"
version = "0.0.79"
edition = "2024"
rust-version = "1.95"
authors = ["Alex Ballmer <gnu3ra@riseup.net>", "RATMA Studio"]
description = "Auto-generated idiomatic Rust types for the Telegram Bot API and WebApp. Fork of fmeef/botapi-rs."
homepage = "https://github.com/RATMA-Studio/ratma-tg-types"
repository = "https://github.com/RATMA-Studio/ratma-tg-types.git"
license = "MIT"

include = [
    "src/**/*",
    "Cargo.toml",
    "examples/**/*",
    "LICENSE",
    "NOTICE.md",
    "README.md"
]

[dependencies]
ratma-tg-types-core = { path = "./crates/core", version = "0.0.79" }
ratma-tg-types-http = { path = "./crates/http", version = "0.0.79", optional = true }

[dev-dependencies]
anyhow = "1.0.102"
futures-util = "0.3.32"
reqwest = { version = "0.13.4", features = ["multipart"] }
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread"] }
tokio-test = "0.4.5"

[features]
default = ["http"]
http = ["dep:ratma-tg-types-http", "ratma-tg-types-core/multipart"]
rhai = ["ratma-tg-types-core/rhai", "ratma-tg-types-http?/rhai"]
