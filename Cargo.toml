[workspace]
members = ["crates/codegen", "crates/core"]
resolver = "3"

[package]
name = "ratma-tg-types"
version = "0.0.79"
edition = "2024"
rust-version = "1.95"
authors = ["Alex Ballmer <gnu3ra@riseup.net>", "RATMA Studio"]
description = "Auto-generated idiomatic Rust types for the Telegram Bot API and WebApp. Fork of fmeef/botapi-rs."
homepage = "https://github.com/RATMA-Studio/ratma-tg-types"
repository = "https://github.com/RATMA-Studio/ratma-tg-types.git"
license = "MIT"

include = [
    "src/**/*",
    "Cargo.toml",
    "examples/**/*",
    "crates/codegen/src/**/*",
    "crates/codegen/Cargo.toml",
    "LICENSE",
    "NOTICE.md",
    "README.md",
]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0.102"
enum_dispatch = "0.3.13"
reqwest = { version = "0.12.28", features = ["json", "multipart", "stream"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", features = ["unbounded_depth"] }
tokio = { version = "1.52.3", features = [
    "net",
    "socket2",
    "io-util",
    "tokio-macros",
    "macros",
    "rt-multi-thread",
] }
serde_urlencoded = "0.7.1"
async-stream = "0.3.6"
futures-core = { version = "0.3.32", features = ["cfg-target-has-atomic"] }
futures-util = "0.3.32"
hyper = { version = "1.9.0", features = ["server", "http2"] }
rand = "0.10.1"
uuid = "1.23.1"
rmp-serde = "1.3.1"
tokio-test = "0.4.5"
ordered-float = { version = "5.3.0", features = ["serde"] }
serde_stacker = "0.1.14"
rhai = { version = "1.24.0", optional = true, features = ["internals"] }
log = "0.4.29"
http-body-util = "0.1.3"
hyper-util = { version = "0.1.20", features = ["server", "tokio"] }

[build-dependencies]
ratma-tg-types-codegen = { path = "./crates/codegen", version = "0.0.79" }
anyhow = "1.0.102"

[features]
default = ["multipart"]
multipart = ["reqwest/multipart"]
rhai = ["dep:rhai"]
